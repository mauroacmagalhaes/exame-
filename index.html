<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filmoteca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14110F;
    --bg-raised: #1F1B17;
    --bg-card: #201B16;
    --gold: #C9A227;
    --crimson: #8B2635;
    --cream: #F2EDE4;
    --muted: #9B948A;
    --hairline: #3A332B;
    --radius: 2px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--cream);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(201,162,39,0.06), transparent 40%),
      radial-gradient(circle at 80% 100%, rgba(139,38,53,0.08), transparent 45%);
  }

  /* ---------- Sprocket motif ---------- */
  .sprocket-row{
    display:flex;
    justify-content:space-between;
    padding: 0 24px;
    height: 14px;
  }
  .sprocket-row span{
    width:8px; height:8px; border-radius:1px;
    background: var(--bg);
    border:1px solid var(--hairline);
    align-self:center;
  }
  .filmstrip{
    background: linear-gradient(180deg, #0c0a09, #14110F);
    border-bottom: 1px solid var(--hairline);
    border-top: 1px solid var(--hairline);
  }

  /* ---------- Header ---------- */
  header{
    padding: 56px 24px 40px;
    max-width: 1180px;
    margin: 0 auto;
    text-align:center;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:.35em;
    text-transform:uppercase;
    font-size:11px;
    color: var(--gold);
    margin-bottom:14px;
  }
  h1{
    font-family:'Bebas Neue', sans-serif;
    font-size: clamp(46px, 8vw, 92px);
    letter-spacing: .04em;
    margin:0;
    line-height:.95;
    color: var(--cream);
    text-shadow: 0 0 30px rgba(201,162,39,0.15);
  }
  h1 em{
    font-style:normal;
    color: var(--gold);
  }
  .subtitle{
    font-family:'Playfair Display', serif;
    font-style: italic;
    color: var(--muted);
    max-width: 560px;
    margin: 16px auto 0;
    font-size:16px;
    line-height:1.6;
  }

  /* ---------- Controls: catalog drawer ---------- */
  .controls-wrap{
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 24px 32px;
  }
  .controls{
    background: var(--bg-raised);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    padding: 22px 24px;
    display:flex;
    flex-wrap:wrap;
    gap: 20px;
    align-items:flex-end;
    position:relative;
  }
  .controls::before{
    content:"CATÁLOGO";
    position:absolute;
    top:-10px; left:20px;
    background: var(--bg-raised);
    padding: 0 8px;
    font-size:10px;
    letter-spacing:.3em;
    color: var(--muted);
  }
  .field{ display:flex; flex-direction:column; gap:8px; }
  .field label{
    font-size:10px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color: var(--muted);
  }
  input[type="text"], select{
    background: var(--bg);
    border: 1px solid var(--hairline);
    color: var(--cream);
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    padding: 10px 12px;
    border-radius: var(--radius);
    min-width: 180px;
  }
  input[type="text"]:focus, select:focus{
    outline: 1px solid var(--gold);
    outline-offset: 2px;
  }
  select{ appearance:none; cursor:pointer; }
  .field select{
    background-image: linear-gradient(45deg, transparent 50%, var(--gold) 50%), linear-gradient(135deg, var(--gold) 50%, transparent 50%);
    background-position: calc(100% - 16px) center, calc(100% - 11px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    padding-right: 30px;
  }
  button{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:.15em;
    text-transform:uppercase;
    font-size:12px;
    background: var(--gold);
    color: #14110F;
    border:none;
    padding: 11px 20px;
    border-radius: var(--radius);
    cursor:pointer;
    font-weight:600;
    transition: filter .15s ease, transform .1s ease;
  }
  button:hover{ filter:brightness(1.1); }
  button:active{ transform: translateY(1px); }
  button.secondary{
    background:transparent;
    color: var(--muted);
    border:1px solid var(--hairline);
  }
  button.secondary:hover{ color: var(--cream); border-color: var(--muted); }

  .status-line{
    max-width:1180px; margin: 0 auto; padding: 0 24px 20px;
    color: var(--muted); font-size:12px; letter-spacing:.05em;
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  .status-line strong{ color: var(--gold); font-weight:500; }

  /* ---------- Grid ---------- */
  main{ max-width:1180px; margin:0 auto; padding: 0 24px 80px; }
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 26px;
  }

  .card{
    background: var(--bg-card);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
    transition: transform .18s ease, border-color .18s ease;
  }
  .card:hover{
    transform: translateY(-4px);
    border-color: var(--gold);
  }
  .poster-wrap{
    position:relative;
    aspect-ratio: 2/3;
    background:#0c0a09;
    overflow:hidden;
  }
  .poster-wrap img{
    width:100%; height:100%; object-fit:cover;
    display:block;
    filter: saturate(0.9) contrast(1.05);
  }
  .score-tag{
    position:absolute; top:10px; right:10px;
    background: rgba(20,17,15,0.88);
    border:1px solid var(--gold);
    color: var(--gold);
    font-size:12px;
    padding: 4px 8px;
    border-radius: var(--radius);
    letter-spacing:.05em;
    font-weight:500;
  }
  .genre-tag{
    position:absolute; bottom:10px; left:10px;
    background: rgba(139,38,53,0.85);
    color: var(--cream);
    font-size:10px;
    letter-spacing:.15em;
    text-transform:uppercase;
    padding: 4px 8px;
    border-radius: var(--radius);
  }
  .card-body{
    padding: 16px 16px 18px;
    display:flex;
    flex-direction:column;
    gap:8px;
    flex:1;
  }
  .card-title{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:18px;
    line-height:1.25;
    color: var(--cream);
  }
  .card-meta{
    font-size:11px;
    color: var(--muted);
    letter-spacing:.04em;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .card-meta b{ color: var(--gold); font-weight:500; }
  .card-plot{
    font-size:12.5px;
    line-height:1.55;
    color: #cfc8bb;
    flex:1;
    display:-webkit-box;
    -webkit-line-clamp:4;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card-cast{
    font-size:11px;
    color: var(--muted);
    border-top: 1px dashed var(--hairline);
    padding-top:8px;
  }
  .card-cast b{ color:#cfc8bb; font-weight:500; }

  .empty-state, .loading-state{
    grid-column: 1 / -1;
    text-align:center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state .big{
    font-family:'Bebas Neue', sans-serif;
    font-size:42px;
    letter-spacing:.05em;
    color: var(--cream);
    display:block;
    margin-bottom:10px;
  }
  .loading-state .reel{
    width:34px; height:34px;
    border:3px solid var(--hairline);
    border-top-color: var(--gold);
    border-radius:50%;
    margin: 0 auto 16px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  footer{
    text-align:center;
    padding: 26px 20px 40px;
    color: var(--muted);
    font-size:11px;
    letter-spacing:.1em;
  }

  @media (prefers-reduced-motion: reduce){
    .card, .loading-state .reel{ transition:none; animation:none; }
  }
</style>
</head>
<body>

<div class="filmstrip"><div class="sprocket-row" id="sprocketTop"></div></div>

<header>
  <div class="eyebrow">Arquivo Digital de Películas</div>
  <h1>FIL<em>MO</em>TECA</h1>
  <p class="subtitle">Uma coleção pesquisável de longas-metragens — carregada de forma assíncrona, catalogada por ano e género.</p>
</header>

<div class="controls-wrap">
  <div class="controls">
    <div class="field">
      <label for="yearInput">Procurar por ano</label>
      <input type="text" id="yearInput" placeholder="ex: 1994" inputmode="numeric" maxlength="4">
    </div>
    <button id="searchBtn">Procurar</button>

    <div class="field">
      <label for="genreSelect">Filtrar por género</label>
      <select id="genreSelect">
        <option value="">Todos os géneros</option>
      </select>
    </div>

    <button id="clearBtn" class="secondary">Limpar filtros</button>
  </div>
</div>

<div class="status-line">
  <span id="statusText">A preparar catálogo…</span>
  <span id="countText"></span>
</div>

<main>
  <div class="grid" id="grid">
    <div class="loading-state">
      <div class="reel"></div>
      A carregar movies-250.json…
    </div>
  </div>
</main>

<footer>FILMOTECA — dados carregados assincronamente via fetch()</footer>

<div class="filmstrip"><div class="sprocket-row" id="sprocketBottom"></div></div>

<script>
(function(){
  const grid = document.getElementById('grid');
  const yearInput = document.getElementById('yearInput');
  const genreSelect = document.getElementById('genreSelect');
  const searchBtn = document.getElementById('searchBtn');
  const clearBtn = document.getElementById('clearBtn');
  const statusText = document.getElementById('statusText');
  const countText = document.getElementById('countText');

  let allMovies = [];

  // decorative sprocket holes
  function buildSprockets(){
    ['sprocketTop','sprocketBottom'].forEach(id=>{
      const row = document.getElementById(id);
      const n = Math.floor(window.innerWidth / 40);
      row.innerHTML = '';
      for(let i=0;i<n;i++){
        const s = document.createElement('span');
        row.appendChild(s);
      }
    });
  }
  buildSprockets();
  window.addEventListener('resize', buildSprockets);

  // ---------- Async load ----------
  async function loadMovies(){
    try{
      const response = await fetch('movies-250.json');
      if(!response.ok){
        throw new Error('HTTP ' + response.status);
      }
      const data = await response.json();
      allMovies = data;
      populateGenres(data);
      statusText.textContent = 'Catálogo carregado com sucesso.';
      render(allMovies);
    }catch(err){
      statusText.textContent = 'Erro ao carregar movies-250.json — verifique se o ficheiro está na mesma pasta e se está a usar um servidor local (não abrir o ficheiro diretamente no browser).';
      grid.innerHTML = `<div class="empty-state">
        <span class="big">FALHA NO CARREGAMENTO</span>
        Não foi possível ler movies-250.json.<br>
        Detalhe técnico: ${escapeHtml(err.message)}
      </div>`;
      console.error(err);
    }
  }

  function populateGenres(movies){
    const genres = Array.from(new Set(movies.map(m => m.genre))).sort((a,b)=>a.localeCompare(b,'pt'));
    genres.forEach(g=>{
      const opt = document.createElement('option');
      opt.value = g;
      opt.textContent = g;
      genreSelect.appendChild(opt);
    });
  }

  // ---------- Filtering ----------
  function applyFilters(){
    const year = yearInput.value.trim();
    const genre = genreSelect.value;

    let result = allMovies;

    if(year){
      result = result.filter(m => String(m.year) === year);
    }
    if(genre){
      result = result.filter(m => m.genre === genre);
    }
    render(result);
  }

  searchBtn.addEventListener('click', applyFilters);
  yearInput.addEventListener('keydown', e => { if(e.key === 'Enter') applyFilters(); });
  genreSelect.addEventListener('change', applyFilters);
  clearBtn.addEventListener('click', () => {
    yearInput.value = '';
    genreSelect.value = '';
    render(allMovies);
  });

  // ---------- Render ----------
  function render(movies){
    countText.textContent = movies.length + (movies.length === 1 ? ' película' : ' películas');

    if(movies.length === 0){
      grid.innerHTML = `<div class="empty-state">
        <span class="big">SEM RESULTADOS</span>
        Nenhuma película corresponde aos filtros selecionados.
      </div>`;
      return;
    }

    grid.innerHTML = movies.map(cardTemplate).join('');
  }

  function cardTemplate(m){
    return `
      <div class="card">
        <div class="poster-wrap">
          <img src="${m.poster}" alt="Poster de ${escapeHtml(m.title)}" loading="lazy">
          <div class="score-tag">★ ${m.imdb.toFixed(1)}</div>
          <div class="genre-tag">${escapeHtml(m.genre)}</div>
        </div>
        <div class="card-body">
          <div class="card-title">${escapeHtml(m.title)}</div>
          <div class="card-meta">
            <span><b>${m.year}</b></span>
            <span>Dir. ${escapeHtml(m.director)}</span>
          </div>
          <div class="card-plot">${escapeHtml(m.plot)}</div>
          <div class="card-cast"><b>Elenco:</b> ${m.actors.map(escapeHtml).join(', ')}</div>
        </div>
      </div>
    `;
  }

  function escapeHtml(str){
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  loadMovies();
})();
</script>
</body>
</html>
